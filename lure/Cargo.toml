[package]
name = "lure"
repository.workspace = true
authors.workspace = true
license.workspace = true
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
lure-config = { path = "../lure-config", optional = true }
lure-resources = { path = "../lure-resources" }
lure-service-common = { path = "../lure-service-common", optional = true }
lure-lastfm-service = { path = "../lure-lastfm-service", optional = true }
lure-lastfm-service-config = { path = "../lure-lastfm-service-config", optional = true }
lure-listenbrainz-service = { path = "../lure-listenbrainz-service", optional = true }
lure-listenbrainz-service-config = { path = "../lure-listenbrainz-service-config", optional = true }
lure-revolt-api = { path = "../lure-revolt-api", optional = true }
lure-revolt-models = { path = "../lure-revolt-models" }

anyhow.workspace = true
async-trait.workspace = true
clap = { version = "4.5.31", features = ["derive"] }
demand = "1.6.4"
figment = { version = "0.10.19", features = ["env", "yaml"], optional = true }
figment_file_provider_adapter = { version = "0.1.1", optional = true }
futures.workspace = true
reqwest = { workspace = true, features = ["json"] }
regex = "1.11.1"
thiserror.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal"] }

[features]
default = ["service-lastfm", "service-listenbrainz"]
service-lastfm = [
  "dep:lure-config",
  "lure-config?/service-lastfm",
  "dep:lure-service-common",
  "dep:lure-lastfm-service",
  "dep:lure-lastfm-service-config",
  "dep:lure-revolt-api",
  "dep:figment",
  "dep:figment_file_provider_adapter",
]
service-listenbrainz = [
  "dep:lure-config",
  "lure-config?/service-listenbrainz",
  "dep:lure-service-common",
  "dep:lure-listenbrainz-service",
  "dep:lure-listenbrainz-service-config",
  "dep:lure-revolt-api",
  "dep:figment",
  "dep:figment_file_provider_adapter",
]
