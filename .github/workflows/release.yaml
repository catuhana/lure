name: Release

on:
  pull_request:
    types:
      - closed

jobs:
  check-release-conditions:
    name: Check Release Conditions
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == github.base_ref &&
        startsWith(github.event.pull_request.head.ref, 'release/v') &&
        startsWith(github.event.pull_request.title, 'Bump version to')
    steps:
      - run: echo "Release conditions met"

  build-and-upload-artifact:
    name: Build and Upload Artifact
    uses: ./.github/workflows/build-code.yaml
    needs: check-release-conditions
    if: ${{ needs.check-release-conditions.result == 'success' }}
    permissions:
      attestations: write
      id-token: write
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    with:
      runs-on: ${{ matrix.os }}

  create-release:
    name: Create Release on GitHub
    runs-on: ubuntu-latest
    needs: build-and-upload-artifact
    if: ${{ needs.build-and-upload-artifact.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          RELEASE_TAG=${BRANCH_NAME#*/}

          gh release create "$RELEASE_TAG" --title "Release $RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" artifacts/**/*

  push-container-image:
    name: Push Container Image
    uses: ./.github/workflows/docker-push.yaml
    needs: check-release-conditions
    if: ${{ needs.check-release-conditions.result == 'success' }}
    with:
      image-name: lure
