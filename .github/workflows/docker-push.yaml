name: Push to GitHub Container Registry

on:
  workflow_call:
    inputs:
      image-name:
        description: Container image name
        required: true
        type: string

jobs:
  push-container-image:
    name: Push Container Image
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build container image
        run: nix build .#docker

      - name: Push container image
        id: docker-push
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
        run: |
          VERSION=$(nix eval --raw .#docker.imageTag)

          ./result | docker image load

          docker push $IMAGE_NAME:$VERSION
          docker push $IMAGE_NAME:latest

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:$VERSION | cut -d@ -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate container image attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.docker-push.outputs.digest }}
          push-to-registry: true
