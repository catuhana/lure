name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag
        required: true

jobs:
  code-check:
    uses: ./.github/workflows/code-check.yaml
  prepare-release:
    name: Prepare Release and Create Pull Request
    runs-on: ubuntu-latest
    needs: code-check
    if: ${{ needs.code-check.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    env:
      NEW_TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Check entered tag format
        run: |
          if [[ ! "$NEW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format. Use the format 'v0.0.0'."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version
        run: sed -i "s/^version = .*/version = \"$NEW_TAG\"/" Cargo.toml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: Bump version to ${{ env.NEW_TAG }}
          commit-message: Bump version to ${{ env.NEW_TAG }}
          branch: release/${{ env.NEW_TAG }}
          delete-branch: true
