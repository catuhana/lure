name: CI
run-name: ${{ inputs.reason }}

on:
  push:
    paths:
      - .github/workflows/ci.yaml
      - .github/workflows/code-check.yaml
      - lure-*/**
      - lure/**
      - build.rs
      - Cargo.lock
      - Cargo.toml
      - flake.nix
      - flake.lock
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yaml
      - .github/workflows/code-check.yaml
      - lure-*/**
      - lure/**
      - build.rs
      - Cargo.lock
      - Cargo.toml
      - flake.nix
      - flake.lock
  workflow_dispatch:
    inputs:
      reason:
        description: Dispatch reason
        type: string
        required: true

jobs:
  code-check:
    uses: ./.github/workflows/code-check.yaml
